name: CI-CD

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S core -B core/build

      - name: Build core
        run: cmake --build core/build --config Release

      - name: Test core
        run: ctest --test-dir core/build --output-on-failure

  cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLI
        run: python -m pip install -e ./cli

      - name: Smoke test CLI
        run: eventctl --help

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -r web/backend/requirements.txt

      - name: Backend import check
        run: python -c "from app.main import app" 
        working-directory: web/backend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: npm install && npm run build
        working-directory: web/frontend

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [core, cli, web]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t eventd/core:ci ./core
          docker build -t eventd/cli:ci ./cli
          docker build -t eventd/backend:ci ./web/backend
          docker build -t eventd/frontend:ci ./web/frontend
          docker build -t eventd/mcp:ci ./mcp
