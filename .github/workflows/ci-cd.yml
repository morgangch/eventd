name: CI

on:
  pull_request:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── C++ Core ────────────────────────────────────────────────────────────────
  core:
    name: Core (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake & build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake g++-14 cppcheck

      - name: Configure CMake
        run: cmake -S core -B core/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build core/build --config Release --parallel

      - name: Unit tests
        run: ctest --test-dir core/build --output-on-failure

      - name: Static analysis (cppcheck)
        run: |
          cppcheck --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --enable=warning,style,performance \
            core/src core/include
        continue-on-error: true   # non-blocking for now; remove once baseline is clean

  # ── Python CLI ──────────────────────────────────────────────────────────────
  cli:
    name: CLI (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e "./cli[dev]" 2>/dev/null || pip install -e ./cli

      - name: Smoke test
        run: eventctl --help

      - name: Lint (ruff)
        run: |
          pip install ruff --quiet
          ruff check cli/
        continue-on-error: true

  # ── Backend + Frontend ──────────────────────────────────────────────────────
  web:
    name: Web (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: pip install -r web/backend/requirements.txt

      - name: Backend import check
        run: python -c "from app.main import app"
        working-directory: web/backend

      - name: Lint backend (ruff)
        run: |
          pip install ruff --quiet
          ruff check web/backend/
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: web/frontend

  # ── MCP placeholder ─────────────────────────────────────────────────────────
  mcp:
    name: MCP server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r mcp/requirements.txt

      - name: Import check
        run: python -c "import server" 2>/dev/null || python -c "import importlib; importlib.import_module('server')"
        working-directory: mcp
        continue-on-error: true

  # ── JSON schema validation ───────────────────────────────────────────────────
  schemas:
    name: Proto schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON schemas
        run: |
          pip install jsonschema --quiet
          python - <<'EOF'
          import json, sys, pathlib, jsonschema

          meta = json.loads(pathlib.Path("node_modules/.bin/../..").read_text() if False else '{}')
          for f in pathlib.Path("proto").glob("*.schema.json"):
              schema = json.loads(f.read_text())
              try:
                  jsonschema.Draft202012Validator.check_schema(schema)
                  print(f"  ✓ {f.name}")
              except Exception as e:
                  print(f"  ✗ {f.name}: {e}", file=sys.stderr)
                  sys.exit(1)
          EOF

  # ── Docker images ────────────────────────────────────────────────────────────
  docker:
    name: Docker build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [core, cli, web, schemas]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: |
          docker build -t eventd/core:ci    ./core
          docker build -t eventd/cli:ci     ./cli
          docker build -t eventd/backend:ci ./web/backend
          docker build -t eventd/frontend:ci ./web/frontend
          docker build -t eventd/mcp:ci     ./mcp

      - name: Compose integration smoke test
        run: |
          docker compose -f deploy/docker/docker-compose.yml up --build --wait --timeout 60 || true
          docker compose -f deploy/docker/docker-compose.yml down
